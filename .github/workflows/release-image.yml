name: Release Image

# Builds the hardened (distroless) Velociraptor image and pushes it to GHCR.
# Version is the single source of truth: `ARG VELO_VERSION` in the Dockerfile.
# Tags published: <version>-distroless and latest (amd64 only — see Dockerfile).
on:
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Override version tag (optional, e.g. 0.76.6). Defaults to ARG VELO_VERSION in Dockerfile.'
        required: false
        type: string
  # Auto-release when the version-bump PR from update-versions.yml is merged.
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Image name follows README: ghcr.io/<owner>/velociraptor
  IMAGE_NAME: ${{ github.repository_owner }}/velociraptor

jobs:
  # ===========================================================================
  # Job 1: Prepare - resolve version (from Dockerfile) and lowercase names
  # ===========================================================================
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    # Manual dispatch, OR the bot's version-bump PR (chore/update-velociraptor) was merged.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'chore/update-velociraptor')
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      image_name_lower: ${{ steps.lowercase.outputs.image_name_lower }}
      repository_owner_lower: ${{ steps.lowercase.outputs.repository_owner_lower }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert names to lowercase
        id: lowercase
        run: |
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "image_name_lower=${IMAGE_NAME_LOWER}" >> $GITHUB_OUTPUT
          echo "repository_owner_lower=${OWNER_LOWER}" >> $GITHUB_OUTPUT

          echo "Image name (lowercase): ${IMAGE_NAME_LOWER}"
          echo "Repository owner (lowercase): ${OWNER_LOWER}"

      - name: Resolve version
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.force_version }}" ]; then
            VERSION="${{ github.event.inputs.force_version }}"
            echo "Using forced version: $VERSION"
          else
            # Single source of truth: ARG VELO_VERSION in the Dockerfile (e.g. v0.76.6)
            VELO_VERSION=$(grep -oP '^ARG VELO_VERSION=\K\S+' Dockerfile)
            if [ -z "$VELO_VERSION" ]; then
              echo "ERROR: could not read ARG VELO_VERSION from Dockerfile" >&2
              exit 1
            fi
            # Strip leading 'v' for the image tag
            VERSION="${VELO_VERSION#v}"
            echo "Version from Dockerfile: ${VELO_VERSION} -> ${VERSION}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

  # ===========================================================================
  # Job 2: Build and push the distroless image
  # ===========================================================================
  build-image:
    name: Build image
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker metadata and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}-distroless
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=velociraptor
            org.opencontainers.image.description=Velociraptor DFIR server — hardened distroless image
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.vendor=Maxime Wewer
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,oci-mediatypes=true

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            '${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:${{ needs.prepare.outputs.version }}-distroless'

  # ===========================================================================
  # Job 3: Generate SBOM
  # ===========================================================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [prepare, build-image]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:${{ needs.prepare.outputs.version }}-distroless
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 7

  # ===========================================================================
  # Job 4: Create GitHub release (idempotent — skipped if tag already exists)
  # ===========================================================================
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [prepare, sbom]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom

      - name: Check if release already exists
        id: exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists — skipping creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist — will create."
          fi

      - name: Create GitHub Release
        if: steps.exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Release v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            sbom/sbom.spdx.json
          body: |
            ## Velociraptor hardened image v${{ needs.prepare.outputs.version }}

            Distroless, rootless (uid 65532), amd64.

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:${{ needs.prepare.outputs.version }}-distroless
            docker pull ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:latest
            ```

      - name: Release summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## Image published

          | Tag |
          |-----|
          | \`${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:${{ needs.prepare.outputs.version }}-distroless\` |
          | \`${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_name_lower }}:latest\` |
          EOF

  # ===========================================================================
  # Job 5: Cleanup untagged container images
  # ===========================================================================
  cleanup:
    name: Cleanup untagged images
    runs-on: ubuntu-latest
    needs: [prepare, create-release]
    permissions:
      packages: write
    steps:
      - name: Delete untagged container images
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = '${{ needs.prepare.outputs.repository_owner_lower }}';
            const packageName = 'velociraptor';

            async function purge(list, del) {
              let deleted = 0;
              for (const version of list) {
                const tags = version.metadata?.container?.tags || [];
                if (tags.length === 0) {
                  try {
                    await del(version.id);
                    deleted++;
                    console.log(`Deleted untagged version ${version.id}`);
                  } catch (e) {
                    console.log(`Failed to delete ${version.id}: ${e.message}`);
                  }
                } else {
                  console.log(`Keeping ${version.id} with tags: ${tags.join(', ')}`);
                }
              }
              console.log(`Cleanup complete. Deleted ${deleted} untagged versions.`);
            }

            try {
              const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                package_type: 'container', package_name: packageName, username: owner, per_page: 100,
              });
              await purge(versions.data, (id) => github.rest.packages.deletePackageVersionForUser({
                package_type: 'container', package_name: packageName, username: owner, package_version_id: id,
              }));
            } catch (error) {
              console.log('User API failed, trying organization API...');
              try {
                const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                  package_type: 'container', package_name: packageName, org: owner, per_page: 100,
                });
                await purge(versions.data, (id) => github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'container', package_name: packageName, org: owner, package_version_id: id,
                }));
              } catch (orgError) {
                console.log(`Organization API also failed: ${orgError.message}`);
                console.log('Cleanup skipped - package may not exist yet or insufficient permissions');
              }
            }
